services:
  db-test:
    image: postgis/postgis:16-3.4
    profiles:
      - test
    environment:
      POSTGRES_DB: shipsim_test
      POSTGRES_USER: shipsim_test
      POSTGRES_PASSWORD: shipsim-test-only
    ports:
      - "15432:5432"
    volumes:
      - ship-sim-db-test:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shipsim_test -d shipsim_test"]
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  ship-sim-db-test:
