name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true

      - name: Go test
        run: go test ./...

      - name: Go vet
        run: go vet ./...

      - name: Go build
        run: go build ./cmd/sim-server

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Generate API types
        run: npm run generate:types

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: npm audit
        run: npm audit --audit-level=high --registry=https://registry.npmjs.org

  docker:
    name: docker
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Compute image metadata
        id: meta
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME//\//-}"
          if [[ "$GITHUB_REF_TYPE" != "tag" ]]; then
            tag="ci-${GITHUB_SHA::12}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "image=shipsim:${tag}" >> "$GITHUB_OUTPUT"

      - name: Docker build
        run: docker build -t "${{ steps.meta.outputs.image }}" .

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.meta.outputs.image }}
          format: spdx-json
          output-file: shipsim-${{ steps.meta.outputs.tag }}.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: shipsim-${{ steps.meta.outputs.tag }}-sbom
          path: shipsim-${{ steps.meta.outputs.tag }}.spdx.json

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ steps.meta.outputs.image }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
